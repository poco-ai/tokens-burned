version: 2
updates:
  # ========== npm ==========
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"           # 每周检查
    open-pull-requests-limit: 4    # 最多同时开 4 个 PR
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  # ========== GitHub Actions ==========
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch

  # ========== Docker（可选）==========
  - package-ecosystem: "docker"
    directory: "/web"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2