name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4

  publish-cli:
    runs-on: ubuntu-latest
    needs: release
    if: ${{ needs.release.outputs.release_created == 'true' }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify release versions
        env:
          RELEASE_TAG: ${{ needs.release.outputs.tag_name }}
          RELEASE_VERSION: ${{ needs.release.outputs.version }}
        run: |
          set -euo pipefail
          test "$RELEASE_TAG" = "v$RELEASE_VERSION"
          node <<'NODE'
          const fs = require("node:fs");
          const version = process.env.RELEASE_VERSION;
          const packages = [
            "package.json",
            "cli/package.json",
            "web/package.json",
          ];

          for (const file of packages) {
            const pkg = JSON.parse(fs.readFileSync(file, "utf8"));
            if (pkg.version !== version) {
              throw new Error(`${file} version ${pkg.version} does not match ${version}`);
            }
          }
          NODE

      - name: Test CLI
        run: pnpm --filter ./cli test

      - name: Build CLI
        run: pnpm --filter ./cli build

      - name: Smoke test packed CLI
        shell: bash
        run: |
          set -euo pipefail
          pack_dir="${RUNNER_TEMP}/tokenarena-pack"
          smoke_dir="${RUNNER_TEMP}/tokenarena-smoke"
          mkdir -p "$pack_dir" "$smoke_dir"

          pnpm --filter ./cli pack --pack-destination "$pack_dir"
          package_file="$(find "$pack_dir" -name '*.tgz' -print -quit)"
          test -n "$package_file"

          cd "$smoke_dir"
          export npm_config_cache="$smoke_dir/.npm-cache"
          npm init -y
          npm install --no-audit --no-fund "$package_file"
          ./node_modules/.bin/tokenarena --help
          ./node_modules/.bin/tokenarena status

      - name: Publish CLI to npm
        run: pnpm --filter ./cli publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-web:
    runs-on: ubuntu-latest
    needs: release
    if: ${{ needs.release.outputs.release_created == 'true' }}
    permissions:
      contents: read
      packages: write
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Verify release tag
        env:
          RELEASE_TAG: ${{ needs.release.outputs.tag_name }}
          RELEASE_VERSION: ${{ needs.release.outputs.version }}
        run: |
          set -euo pipefail
          test "$RELEASE_TAG" = "v$RELEASE_VERSION"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.release.outputs.tag_name }}
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push Web Docker image
        id: build-web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_APP_VERSION=${{ needs.release.outputs.tag_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build-web.outputs.digest }}
          severity: CRITICAL,HIGH
          exit-code: 1
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy scan results to GitHub Security tab
        if: ${{ always() }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
