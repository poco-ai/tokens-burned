name: Claude Code
on:
  pull_request:
    types: [opened, synchronize]

permissions:
    contents: read
    pull-requests: write
    issues: write
    id-token: write
    actions: read

jobs:
  claude:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ""
          claude_code_oauth_token: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--model glm-5.1"
          prompt: "/review 审查这个 PR 的代码，并给出改动总结。如果改动较大，请给出详细的改动说明。并分析可能存在的问题。"
          additional_permissions: |
            actions: read
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
