name: Claude Doc Writer

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write
  actions: read

jobs:
  doc-writer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Update documentation for changes
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ""
          claude_code_oauth_token: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--max-turns 25 --model glm-5.1 --allowedTools Bash(git *),Read,Edit,Write"
          prompt: |
            请分析本次代码变更，判断哪些文档需要更新，并直接修改文档。

            执行步骤：

            1. **获取变更内容**
               - 如果是 tag push：使用 `git log <上一个 tag>..HEAD --oneline` 查看所有变更
               - 如果是 branch push：使用 `git diff HEAD~1..HEAD --stat` 和 `git diff HEAD~1..HEAD` 查看变更

            2. **分析变更涉及的文档范围**
               根据变更内容，检查以下文档是否需要更新：
               - `README.md` — 新增功能、环境变量、安装步骤、命令变更等
               - `cli/AGENTS.md` — CLI 架构、模块职责、测试策略变更
               - `web/AGENTS.md` — Web 架构、组件结构、路由变更
               - `web/README.md` — Web 环境变量、配置、运行命令变更
               - `SECURITY.md` — 安全策略、认证方式变更
               - `docs/` 目录下如有相关文档也需检查

            3. **判断是否需要更新**
               跳过以下情况，不做任何修改：
               - 纯样式调整、typo 修复、不影响行为的重构
               - CI/CD 配置变更（不影响用户或开发者文档）
               - 变更与文档内容无关

            4. **更新文档**
               如果需要更新：
               - 在文档的对应位置插入或修改内容，保持现有文档的结构和风格
               - 使用简明扼要的技术文档风格，避免冗余描述
               - 只添加与本次变更直接相关的内容，不改动无关段落
               - 确保与现有文档的格式一致（标题层级、列表风格、代码块格式等）

            只需要修改文件，不需要 git commit 或 git push。
          additional_permissions: |
            actions: read
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}

      - name: Create documentation PR
        uses: peter-evans/create-pull-request@v7
        with:
          title: "docs: update documentation for recent changes"
          body: |
            自动生成的文档更新 PR。

            由 Claude Doc Writer 根据最近的代码变更自动分析并更新相关文档。
          commit-message: "docs: update documentation for recent changes"
          branch: docs/auto-update
          delete-branch: true
          labels: documentation
