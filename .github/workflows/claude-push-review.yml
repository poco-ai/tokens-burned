name: Claude Code Review & Score

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  id-token: write
  actions: read
jobs:
  review-and-score:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Generate code review report
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ""
          claude_code_oauth_token: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--max-turns 20 --model glm-5.1 --allowedTools Bash(git *),Read,Write"
          prompt: |
            请对本次 push 的代码变更进行审查和评分。

            执行步骤：
            1. 使用 `git log -1 --format="%H"` 获取最新 commit hash
            2. 使用 `git diff HEAD~1..HEAD` 查看本次变更内容
            3. 使用 `git log -1 --format="%B"` 查看提交信息
            4. 对变更进行全面分析，从以下维度评分（每项 1-10 分）：
               - 代码质量：代码是否清晰、可维护
               - 安全性：是否存在安全隐患
               - 性能：是否引入性能问题
               - 测试覆盖：变更是否有对应的测试
               - 文档：是否更新了相关文档
            5. 给出总评分（满分 10 分）
            6. 将报告写入 `/tmp/review-report.md`
            7. 将总评分写入 `/tmp/review-score.txt`（只写数字）
            8. 将 commit hash 前 7 位写入 `/tmp/review-hash.txt`

            报告格式（中文）：
            ## 代码变更评分报告
            **提交**: <commit hash 前 7 位>
            **提交信息**: <message>
            **变更文件**: <列出变更的文件>

            ### 评分详情
            | 维度 | 分数 | 说明 |
            |------|------|------|
            | 代码质量 | x/10 | ... |
            | 安全性 | x/10 | ... |
            | 性能 | x/10 | ... |
            | 测试覆盖 | x/10 | ... |
            | 文档 | x/10 | ... |
            | **总分** | **x/10** | |

            ### 改进建议
            - ...

            只需要写文件，不需要执行其他操作。
          additional_permissions: |
            actions: read
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}

      - name: Create review issue
        uses: actions/github-script@v9
        env:
          ISSUE_TITLE: "代码变更评分: ${{ steps.claude-review.outputs.result }}"
        with:
          script: |
            const fs = require('fs')
            const body = fs.readFileSync('/tmp/review-report.md', 'utf8')
            const score = fs.readFileSync('/tmp/review-score.txt', 'utf8').trim()
            const hash = fs.readFileSync('/tmp/review-hash.txt', 'utf8').trim()
            const title = `代码变更评分: ${hash} - ${score}/10`

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['code-review']
            })
