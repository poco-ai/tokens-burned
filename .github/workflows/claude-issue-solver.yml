name: Claude Code
on:
  issue_comment:
    types: [created]

permissions:
    contents: read
    pull-requests: write
    issues: write
    id-token: write
    actions: read

jobs:
  claude:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ""
          claude_code_oauth_token: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--max-turns 25 --model glm-5.1"
          prompt: "根据 issue 提出的问题，对问题进行分析，先分析可能的原因，并给出详细的解决方案。"
          additional_permissions: |
            actions: read
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
