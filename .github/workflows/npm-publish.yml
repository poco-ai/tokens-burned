# CLI package (@poco-ai/tokenarena): test, build, package smoke, and publish.
# Publishes to npm when a v* tag is pushed or when workflow_dispatch is run.

name: Publish CLI to npm

on:
    workflow_dispatch:
    push:
      tags:
        - "v*"

permissions:
  contents: read
  packages: write

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test CLI
        run: pnpm --filter ./cli test

      - name: Build CLI
        run: pnpm --filter ./cli build

      - name: Smoke test packed CLI
        shell: bash
        run: |
          set -euo pipefail
          pack_dir="${RUNNER_TEMP}/tokenarena-pack"
          smoke_dir="${RUNNER_TEMP}/tokenarena-smoke"
          mkdir -p "$pack_dir" "$smoke_dir"

          pnpm --filter ./cli pack --pack-destination "$pack_dir"
          package_file="$(find "$pack_dir" -name '*.tgz' -print -quit)"
          test -n "$package_file"

          cd "$smoke_dir"
          export npm_config_cache="$smoke_dir/.npm-cache"
          npm init -y
          npm install --no-audit --no-fund "$package_file"
          ./node_modules/.bin/tokenarena --help
          ./node_modules/.bin/tokenarena status

      - name: Publish to npm
        run: pnpm --filter ./cli publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
