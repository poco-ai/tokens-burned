name: Claude Weekly Architecture Review

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  id-token: write
  actions: read

jobs:
  architecture-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run architecture review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ""
          claude_code_oauth_token: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--max-turns 25 --model glm-5.1 --allowedTools Bash(git *),Bash(grep *),Bash(find *),Read,Write"
          prompt: |
            请对仓库的架构进行全面审查。执行以下步骤：

            1. **项目结构分析**
               - 列出顶层目录结构和各目录的职责
               - 分析 monorepo 的 workspace 组织是否合理
               - 检查模块间的依赖关系

            2. **代码组织评估**
               - 检查各模块的职责是否清晰、单一
               - 是否有循环依赖
               - 共享代码的组织方式是否合理
               - 检查是否有代码重复

            3. **架构质量指标**
               - 评估代码的可维护性
               - 评估可扩展性
               - 评估测试覆盖和测试策略
               - 评估错误处理模式

            4. **技术债务识别**
               - 使用 grep 搜索 TODO/FIXME/HACK 等标记
               - 列出需要重构的代码
               - 识别过时的模式或废弃的依赖

            5. **改进建议**
               - 短期可执行的改进
               - 长期架构演进方向

            将报告写入 `/tmp/architecture-report.md`，格式如下（中文）：

            ## 周度架构审查报告
            **审查日期**: <日期>
            **仓库**: <仓库名>

            ### 项目概览
            <项目结构树和技术栈概览>

            ### 架构评估
            | 维度 | 评分 | 说明 |
            |------|------|------|
            | 模块化 | x/10 | ... |
            | 可维护性 | x/10 | ... |
            | 可扩展性 | x/10 | ... |
            | 测试覆盖 | x/10 | ... |
            | 代码质量 | x/10 | ... |

            ### 技术债务
            <列出技术债务，按优先级排序>

            ### 改进建议
            <列出具体可行的改进建议>

            只需要写文件，不需要执行其他操作。
          additional_permissions: |
            actions: read
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}

      - name: Create architecture issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const body = fs.readFileSync('/tmp/architecture-report.md', 'utf8')
            const date = new Date().toISOString().split('T')[0]

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `周度架构审查报告 - ${date}`,
              body: body,
              labels: ['architecture']
            })
