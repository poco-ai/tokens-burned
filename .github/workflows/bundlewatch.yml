name: Bundle Size

on:
  push:
    branches:
      - main
    paths:
      - "web/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
  pull_request:
    paths:
      - "web/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"

permissions:
  contents: read

jobs:
  bundle:
    name: Check Bundle Size
    runs-on: ubuntu-latest
    env:
      AUTH_MODE: self-hosted
      BETTER_AUTH_SECRET: ci-placeholder-secret-key-for-builds-only-000000
      BETTER_AUTH_URL: http://localhost:3000
      DATABASE_URL: postgresql://test:test@localhost:5432/tokenarena_test
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install ${{ github.actor == 'dependabot[bot]' && '--no-frozen-lockfile' || '--frozen-lockfile' }}

      - name: Generate Prisma client
        run: pnpm --filter ./web exec prisma generate

      - name: Build web
        run: pnpm --filter ./web build

      - name: Check bundle size limits
        run: pnpm --filter ./web size

      - name: Upload bundle size to Codecov
        uses: codecov/codecov-action@v5
        with:
          flags: bundle
          directory: web/
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: poco-ai/tokenarena
