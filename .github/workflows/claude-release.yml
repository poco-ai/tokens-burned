name: Claude Release Summary

on:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  actions: read

jobs:
  release-summary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Get previous tag
        id: prev-tag
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "prev_tag=$PREV_TAG" >> "$GITHUB_OUTPUT"
          echo "current_tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ""
          claude_code_oauth_token: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--max-turns 20 --model glm-5.1 --allowedTools Bash(git *),Read,Write"
          prompt: |
            当前 tag 是 ${{ steps.prev-tag.outputs.current_tag }}，上一个 tag 是 ${{ steps.prev-tag.outputs.prev_tag }}。

            请执行以下任务：
            1. 使用 `git log ${{ steps.prev-tag.outputs.prev_tag }}..HEAD --oneline` 查看两个 tag 之间的所有提交
            2. 总结这些提交的变更内容，按功能模块分类
            3. 将总结写入文件 `/tmp/release-notes.md`

            文件格式要求（中文）：
            - 包含"新功能"、"改进"、"修复"等分类
            - 列出关键变更
            - 如果有破坏性变更，需要特别标注

            只需要写文件，不需要执行其他操作。
          additional_permissions: |
            actions: read
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release-notes.md
          name: ${{ steps.prev-tag.outputs.current_tag }}
