name: Coverage

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  coverage:
    name: Coverage report
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install ${{ github.actor == 'dependabot[bot]' && '--no-frozen-lockfile' || '--frozen-lockfile' }}

      - name: Generate Prisma client
        run: pnpm --filter ./web exec prisma generate

      - name: Test CLI with coverage
        run: pnpm --filter ./cli test:coverage

      - name: Test web with coverage
        run: pnpm --filter ./web test:coverage

      - name: Write coverage summary
        run: |
          node <<'NODE'
          const fs = require("node:fs");

          const marker = "<!-- tokenarena-coverage-report -->";
          const reports = [
            ["CLI", "cli/coverage/coverage-summary.json"],
            ["Web", "web/coverage/coverage-summary.json"],
          ];

          const pct = (value) => (typeof value === "number" ? `${value.toFixed(2)}%` : "n/a");
          const rows = reports.map(([name, path]) => {
            if (!fs.existsSync(path)) {
              return `| ${name} | n/a | n/a | n/a | n/a |`;
            }

            const summary = JSON.parse(fs.readFileSync(path, "utf8"));
            const total = summary.total ?? {};
            return `| ${name} | ${pct(total.lines?.pct)} | ${pct(total.statements?.pct)} | ${pct(total.functions?.pct)} | ${pct(total.branches?.pct)} |`;
          });

          const body = [
            "## Coverage Report",
            "",
            "| Workspace | Lines | Statements | Functions | Branches |",
            "| --- | ---: | ---: | ---: | ---: |",
            ...rows,
            "",
            "Coverage is reported for visibility only; no threshold is enforced.",
          ].join("\n");

          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `${body}\n`);
          fs.writeFileSync("coverage-comment.md", `${marker}\n${body}\n`);
          NODE

      - name: Comment coverage on pull request
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v9
        continue-on-error: true
        with:
          script: |
            const fs = require("node:fs");
            const marker = "<!-- tokenarena-coverage-report -->";
            const body = fs.readFileSync("coverage-comment.md", "utf8");
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.rest.issues.listComments({ owner, repo, issue_number, per_page: 100 });
            const previous = comments.data.find((comment) =>
              comment.user?.type === "Bot" && comment.body?.includes(marker),
            );

            if (previous) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: previous.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
