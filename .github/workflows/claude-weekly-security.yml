name: Claude Weekly Security Check

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  id-token: write
  actions: read

jobs:
  security-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run security audit
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ""
          claude_code_oauth_token: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--max-turns 25 --model glm-5.1 --allowedTools Bash(git *),Bash(grep *),Bash(npm *),Bash(npx *),Read,Write"
          prompt: |
            请对仓库进行全面的安全检查。执行以下步骤：

            1. **依赖安全审计**
               - 使用 `npm audit` 或 `npx npm-audit` 检查已知漏洞
               - 检查是否有过时的依赖版本

            2. **代码安全扫描**
               - 搜索可能的硬编码密钥、token、密码
               - 检查是否有 SQL 注入、XSS、命令注入等 OWASP Top 10 风险
               - 检查是否有不安全的随机数生成、弱加密算法使用

            3. **配置安全检查**
               - 检查 GitHub Actions 配置是否安全（权限最小化、secret 使用等）
               - 检查 Docker 配置是否安全（如果有）
               - 检查 CORS、CSP 等安全头配置

            4. **敏感信息泄露检查**
               - 检查 .gitignore 是否完整
               - 检查是否有意外提交的敏感文件

            将报告写入 `/tmp/security-report.md`，格式如下（中文）：

            ## 周度安全检查报告
            **检查日期**: <日期>
            **仓库**: <仓库名>

            ### 高风险问题
            <列出发现的高风险问题，包含文件路径和行号>

            ### 中风险问题
            <列出中风险问题>

            ### 建议改进
            <列出安全改进建议>

            ### 安全状态良好的方面
            <列出做得好的方面>

            只需要写文件，不需要执行其他操作。
          additional_permissions: |
            actions: read
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}

      - name: Create security issue
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs')
            const body = fs.readFileSync('/tmp/security-report.md', 'utf8')
            const date = new Date().toISOString().split('T')[0]

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `周度安全检查报告 - ${date}`,
              body: body,
              labels: ['security']
            })
