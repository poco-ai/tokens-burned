name: Claude Weekly Issue Summary

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  id-token: write
  actions: read

jobs:
  issue-summary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Analyze open issues
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ""
          claude_code_oauth_token: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--max-turns 30 --model glm-5.1 --allowedTools Bash(gh *),Read,Write"
          prompt: |
            请对所有 open 的 issue 进行进度分析，并生成操作计划。

            执行步骤：

            1. 使用 `gh issue list --state open --json number,title,assignees,labels,updatedAt,comments --limit 100` 获取所有打开的 issue
            2. 对每个 issue，使用 `gh issue view <number> --json body,comments` 查看详情和评论
            3. 分析每个 issue 的状态：可能已解决 / 进行中 / 停滞中 / 新 issue
            4. 生成汇总报告和操作计划

            将结果写入两个文件：

            **`/tmp/issue-summary.md`** — 汇总报告（中文）：
            ## 周度 Issue 进度汇总
            **汇总日期**: <日期>
            **仓库**: <仓库名>
            **Open issue 总数**: <数量>

            ### 可能已解决
            <列出 issue 编号、标题、原因>

            ### 进行中
            <列出 issue 编号、标题、当前进度、负责人>

            ### 停滞中
            <列出 issue 编号、标题、停滞时长>

            ### 新 Issue
            <列出最近创建的 issue>

            **`/tmp/issue-comments.json`** — 需要添加评论的 issue 列表，JSON 数组格式：
            ```json
            [
              {
                "number": 123,
                "comment": "这是该 issue 的进度总结和下一步建议。@assignee 请关注此 issue。"
              }
            ]
            ```
            只对停滞中且无人处理的 issue 生成评论计划。

            只需要写文件，不需要执行其他操作。
          additional_permissions: |
            actions: read
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}

      - name: Create summary issue
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs')
            const body = fs.readFileSync('/tmp/issue-summary.md', 'utf8')
            const date = new Date().toISOString().split('T')[0]

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `周度 Issue 进度汇总 - ${date}`,
              body: body,
              labels: ['weekly-summary']
            })

      - name: Post comments on stale issues
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs')
            let comments
            try {
              comments = JSON.parse(fs.readFileSync('/tmp/issue-comments.json', 'utf8'))
            } catch (e) {
              console.log('No comments file or invalid JSON, skipping')
              return
            }

            for (const item of comments) {
              try {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: item.number,
                  body: item.comment
                })
                console.log(`Commented on issue #${item.number}`)
              } catch (e) {
                console.log(`Failed to comment on issue #${item.number}: ${e.message}`)
              }
            }
